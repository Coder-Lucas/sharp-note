[build]
base = "."
publish = ".next"
command = "pnpm run build"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
force = false

[[headers]]
for = "/*"

[headers.values]
Permissions-Policy = "camera=(), geolocation=(), microphone=(), payment=()"
Referrer-Policy = "strict-origin-when-cross-origin"
X-Content-Type-Options = "nosniff"
X-Frame-Options = "DENY"
